name: Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend-tests:
        name: Backend Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: warehouse-backend/package-lock.json

            - name: Install backend dependencies
              working-directory: ./warehouse-backend
              run: npm ci

            - name: Run backend tests with Docker
              run: docker-compose --profile test up --abort-on-container-exit --exit-code-from test-runner

            - name: Upload backend test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: backend-test-results
                  path: warehouse-backend/coverage/
                  retention-days: 30

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: warehouse-frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: ./warehouse-frontend
              run: npm ci

            - name: Install Playwright browsers
              working-directory: ./warehouse-frontend
              run: npx playwright install --with-deps chromium

            - name: Start backend and database
              run: |
                  cd warehouse-backend
                  docker-compose up -d
                  sleep 10
                  npm run dev &
                  sleep 5

            - name: Run Playwright tests
              working-directory: ./warehouse-frontend
              run: npm run test:e2e
              env:
                  CI: true

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: warehouse-frontend/playwright-report/
                  retention-days: 30

            - name: Upload test screenshots
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-screenshots
                  path: warehouse-frontend/test-results/
                  retention-days: 30
