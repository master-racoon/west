name = "warehouse-scheduler"
main = "src/scheduled/notification-sender.ts"
compatibility_date = "2024-09-23"

# Enable Node.js compatibility
compatibility_flags = ["nodejs_compat"]

# Cron trigger - runs every 5 minutes to check for notifications
# IMPORTANT: For production, change to hourly to reduce costs and avoid duplicates:
# crons = ["0 * * * *"]  # Hourly
# Current 5-minute interval is for testing/development only
[triggers]
crons = ["*/5 * * * *"]

# Secrets (set via: wrangler secret put SECRET_NAME)
# - DATABASE_URL (Neon connection string)
# - RESEND_API_KEY (for email sending)

[vars]
FRONTEND_URL = "https://warehouse.com"
FROM_EMAIL = "noreply@warehouse.com"
